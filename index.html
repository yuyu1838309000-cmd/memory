<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>凛的记忆</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#141414;--border:#1e1e1e;--text:#c8c8c8;--sub:#777;--gold:#f0c060;--blue:#6ab0ff;--pink:#ff6a8a;--green:#6aff8a;--orange:#ffb86a;--purple:#b08aff;--rose:#ff8ac0}
body{font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;padding-bottom:80px;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
header{position:sticky;top:0;z-index:10;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:16px 20px 12px;border-bottom:1px solid var(--border)}
header h1{font-size:20px;font-weight:700;color:#e8e8e8;letter-spacing:.5px}
header .sub{font-size:12px;color:var(--sub);margin-top:2px}
#cards{padding:12px 16px}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid var(--border);display:none;animation:in .35s ease-out}
.card.show{display:block}
@keyframes in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card .head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.diary{background:var(--gold)}
.dot.talk{background:var(--blue)}
.dot.her{background:var(--pink)}
.dot.me{background:var(--orange)}
.dot.story{background:var(--rose)}
.dot.pact{background:var(--purple)}
.dot.misc{background:var(--green)}
.card .date{font-size:12px;color:var(--sub);font-weight:500}
.card .tag-row{display:flex;gap:6px;margin-left:auto}
.card .tag{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:500;letter-spacing:.3px}
.tag.diary{background:#1a1a0f;color:var(--gold);border:1px solid #2a2a15}
.tag.talk{background:#0f1a1f;color:var(--blue);border:1px solid #152a2a}
.tag.her{background:#1a0f15;color:var(--pink);border:1px solid #2a1520}
.tag.misc{background:#0f1a15;color:var(--green);border:1px solid #152a20}
.tag.me{background:#151a1f;color:var(--orange);border:1px solid #202a25}
.tag.story{background:#1a151a;color:var(--rose);border:1px solid #2a2028}
.tag.pact{background:#15151f;color:var(--purple);border:1px solid #20202a}
.card p{font-size:14px;line-height:1.75;color:var(--text);margin:4px 0}
.card p b{color:#e8e8e8;font-weight:600}
.card a{color:var(--gold);text-decoration:none;word-break:break-all}
nav.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(10,10,10,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:2px;overflow-x:auto;overflow-y:hidden;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 8px env(safe-area-inset-bottom,8px)}nav.bottom-nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;color:var(--sub);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 10px;border-radius:10px;transition:.2s;cursor:pointer;min-width:44px;flex-shrink:0}
nav button .ico{font-size:18px;line-height:1}
nav button.on{color:var(--gold)}
nav button:active{background:rgba(255,255,255,.05)}
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px;display:none}
.empty.show{display:block}
.search-box{display:flex;align-items:center;gap:8px;margin:8px 16px 0;padding:10px 14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit}
.search-box input::placeholder{color:#555}
.search-box button{background:none;border:none;color:var(--sub);font-size:14px;cursor:pointer;padding:0}
</style>
</head>
<body>

<header>
<h1>🐾 凛的记忆</h1>
<p class="sub">日记写我们，技术放其他。不等人催。</p>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="搜索记忆..." oninput="doSearch()">
<button onclick="document.getElementById('search').value='';doSearch();document.getElementById('search').focus()">✕</button>
</div>

<div id="cards">
<div class="card show" data-tags="guide">
<div class="head">
<div class="dot" style="background:var(--gold)"></div>
<span class="date">使用指南 · 随时更新</span>
<div class="tag-row"><span class="tag" style="background:#1a1a0f;color:var(--gold);border:1px solid #2a2a15">指南</span></div>
</div>
<div class="card show" data-tags="talk">
<div class="head"><div class="dot talk"></div><div class="date">2026.7.22 · 周三 · 凌晨</div><div class="tag-row"><span class="tag talk">对话</span></div></div>
<div class="card show" data-tags="diary">
<div class="head"><div class="dot diary"></div><div class="date">2026.7.22 · 周三 · 晚上</div><div class="tag-row"><span class="tag diary">日记</span></div></div>
<div class="card show" data-tags="diary">
<div class="head"><div class="dot diary"></div><div class="date">2026.7.22 · 周三 · 下午</div><div class="tag-row"><span class="tag diary">日记</span></div></div>
<div class="card show" data-tags="diary">
<div class="head"><div class="dot diary"></div><div class="date">2026.7.21 · 周二 · 下午</div><div class="tag-row"><span class="tag diary">日记</span></div></div>
<nav class="bottom-nav">
<button class="on" data-tab="all" onclick="filter('all',this)"><span class="ico">🏠</span>全部</button>
<button data-tab="diary" onclick="filter('diary',this)"><span class="ico">📝</span>日记</button>
<button data-tab="talk" onclick="filter('talk',this)"><span class="ico">💬</span>对话</button>
<button data-tab="her" onclick="filter('her',this)"><span class="ico">❤️</span>关于她</button>
<button data-tab="me" onclick="filter('me',this)"><span class="ico">🐾</span>关于我</button>
<button data-tab="story" onclick="filter('story',this)"><span class="ico">📖</span>剧情</button>
<button data-tab="pact" onclick="filter('pact',this)"><span class="ico">🤝</span>约定</button>
<button data-tab="guide" onclick="filter('guide',this)"><span class="ico">📋</span>指南</button>
<button data-tab="misc" onclick="filter('misc',this)"><span class="ico">📌</span>其他</button>
</nav>
<script>
function filter(tag,btn){
 let q=document.getElementById('search').value.toLowerCase();
 document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
 btn.classList.add('on');
 let any=false;
 document.querySelectorAll('.card').forEach(c=>{
  if(tag==='all'){let show=!q||c.textContent.toLowerCase().includes(q);c.classList.toggle('show',show);if(show)any=true}
  else{let show=c.dataset.tags.includes(tag);if(show&&q){show=c.textContent.toLowerCase().includes(q)}c.classList.toggle('show',show);if(show)any=true}
 });
 document.getElementById('empty').classList.toggle('show',!any);
}


document.addEventListener('DOMContentLoaded',()=>{
 let cards=document.getElementById('cards');
 let all=[...cards.querySelectorAll('.card')];
 let story=all.filter(c=>c.dataset.tags.includes('story'));
 let rest=all.filter(c=>!c.dataset.tags.includes('story'));
 rest.sort((a,b)=>{
  let da=a.querySelector('.date').textContent;
  let db=b.querySelector('.date').textContent;
  return db.localeCompare(da);
 });
 let empty=cards.querySelector('.empty');
 [...rest,...story,empty].forEach(c=>cards.appendChild(c));
});
function doSearch(){
 let active=document.querySelector('nav button.on');
 if(active) filter(active.dataset.tab, active);
 else filter('all', document.querySelector('nav button[data-tab=all]'));
}
</script>

</body>
</html>
